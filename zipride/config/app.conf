[fcgi-program:demo_zipride_app]
socket=tcp://localhost:9021
command=/var/deployments/demo/zipride/.venv/bin/daphne -u /var/deployments/demo/zipride/sockets/app.%(process_num)s.sock --fd 0 settings.asgi:application
directory=/var/deployments/demo/zipride
stderr_logfile=/var/deployments/demo/zipride/logs/app.stderr.log
stdout_logfile=/var/deployments/demo/zipride/logs/app.stdout.log
autostart=true
autorestart=true
user=ubuntu
environment=HOME="/home/ubuntu",USER="ubuntu"
numprocs=2
process_name=%(program_name)s_%(process_num)s

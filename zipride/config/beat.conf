[program:demo_zipride_beat]
command=/var/deployments/demo/zipride/.venv/bin/celery -A settings beat -l INFO
directory=/var/deployments/demo/zipride
stderr_logfile=/var/deployments/demo/zipride/logs/beat.stderr.log
stdout_logfile=/var/deployments/demo/zipride/logs/beat.stdout.log
autostart=true
autorestart=true
user=ubuntu
environment=HOME="/home/ubuntu",USER="ubuntu"

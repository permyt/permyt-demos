[program:demo_sentinel_beat]
command=/var/deployments/demo/sentinel/.venv/bin/celery -A settings beat -l INFO
directory=/var/deployments/demo/sentinel
stderr_logfile=/var/deployments/demo/sentinel/logs/beat.stderr.log
stdout_logfile=/var/deployments/demo/sentinel/logs/beat.stdout.log
autostart=true
autorestart=true
user=ubuntu
environment=HOME="/home/ubuntu",USER="ubuntu"

[fcgi-program:demo_sentinel_app]
socket=tcp://localhost:9018
command=/var/deployments/demo/sentinel/.venv/bin/daphne -u /var/deployments/demo/sentinel/sockets/app.%(process_num)s.sock --fd 0 settings.asgi:application
directory=/var/deployments/demo/sentinel
stderr_logfile=/var/deployments/demo/sentinel/logs/app.stderr.log
stdout_logfile=/var/deployments/demo/sentinel/logs/app.stdout.log
autostart=true
autorestart=true
user=ubuntu
environment=HOME="/home/ubuntu",USER="ubuntu"
numprocs=2
process_name=%(program_name)s_%(process_num)s

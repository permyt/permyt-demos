[program:demo_provider_beat]
command=/var/deployments/demo/provider/env/bin/celery -A settings beat -l INFO
directory=/var/deployments/demo/provider
stderr_logfile=/var/deployments/demo/provider/logs/beat.stderr.log
stdout_logfile=/var/deployments/demo/provider/logs/beat.stdout.log
autostart=true
autorestart=true
user=ubuntu
environment=HOME="/home/ubuntu",USER="ubuntu"

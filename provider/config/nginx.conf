upstream demo_provider {
  server localhost:9011;
}

map $http_upgrade $connection_upgrade {
  default   upgrade;
  ''        close;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name provider.permyt.io;

  ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
  ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;

  access_log /var/deployments/demo/provider/logs/nginx.access.log;
  error_log /var/deployments/demo/provider/logs/nginx.error.log;

  client_max_body_size 10M;

  # For Django managed static files (generated via collectstattic)
  location /static {
    alias   /var/deployments/demo/provider/static;
    autoindex off;

    expires 30d;
    add_header Pragma public;
    add_header Cache-Control "public, must-revalidate, proxy-revalidate";

    # Enable gzip static files (js, css, misc): now enabled by the "gzip_settings.conf"
    gzip_static on;
  }

  location / {
    proxy_pass http://demo_provider;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Scheme $scheme;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}

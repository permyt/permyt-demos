{% load static %}
<nav class="navbar">
  <a href="/" class="nav-brand" aria-label="Atlas — company data control panel">
    <span class="atlas-mark" aria-hidden="true">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="8" fill="#1e293b"/>
        <circle cx="16" cy="16" r="9" stroke="#64748b" stroke-width="1.5"/>

        <path d="M7.4 13.2h17.2M7.4 18.8h17.2" stroke="#64748b" stroke-width="1.5"/>
        <path d="m16 4 2.6 4.8H13.4L16 4Z" fill="#f59e0b"/>
      </svg>
    </span>
    <span class="atlas-wordmark">Atlas</span>
  </a>
  <div class="nav-right">
    {% if user.is_authenticated %}
    <form action="{% url 'logout' %}" method="post" class="nav-logout-form">
      {% csrf_token %}
      <button type="submit" class="nav-logout">
        <i data-lucide="log-out"></i>

      </button>
    </form>
    {% endif %}
    <span class="connector-badge">
      <span class="status-dot"></span>
      Data control panel
    </span>
  </div>

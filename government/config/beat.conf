[program:demo_government_beat]
command=/var/deployments/demo/government/env/bin/celery -A settings beat -l INFO
directory=/var/deployments/demo/government
stderr_logfile=/var/deployments/demo/government/logs/beat.stderr.log
stdout_logfile=/var/deployments/demo/government/logs/beat.stdout.log
autostart=true
autorestart=true
user=ubuntu
environment=HOME="/home/ubuntu",USER="ubuntu"

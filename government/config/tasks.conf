[program:demo_government_tasks]
command=/var/deployments/demo/government/env/bin/celery -A settings worker -n demo-government@%%h -l INFO --autoscale=10,3
directory=/var/deployments/demo/government
stderr_logfile=/var/deployments/demo/government/logs/tasks.stderr.log
stdout_logfile=/var/deployments/demo/government/logs/tasks.stdout.log
autostart=true
autorestart=true
user=ubuntu
environment=HOME="/home/ubuntu",USER="ubuntu"

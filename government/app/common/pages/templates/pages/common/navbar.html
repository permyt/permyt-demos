{% load static %}
<nav class="navbar">
  <a href="/" class="nav-brand">
    <svg class="crest" viewBox="0 0 32 32" aria-label="Gov.ID crest">
      <path d="M16 2 5 6v9c0 7 4.6 12 11 15 6.4-3 11-8 11-15V6L16 2Z" fill="#0b3d91" stroke="#c9a227" stroke-width="1"/>
      <path d="M16 9.5 17.6 14h4.7l-3.8 2.8 1.4 4.5L16 18.6 12.1 21.3l1.4-4.5L9.7 14h4.7L16 9.5Z" fill="#fff"/>
    </svg>
    <span class="brand-text">
      <span class="brand-name">Gov.ID</span>
      <span class="brand-sub">National Digital Identity</span>
    </span>
  </a>
  <div class="nav-right">
    <span class="verified-seal">
      <i data-lucide="badge-check"></i>
      Verified by Gov.ID
    </span>
    {% if user.is_authenticated %}
    <form action="{% url 'logout' %}" method="post" class="nav-logout-form">
      {% csrf_token %}
      <button type="submit" class="nav-logout">
        <i data-lucide="log-out"></i>
        Sign out
      </button>
    </form>
    {% endif %}
  </div>
</nav>

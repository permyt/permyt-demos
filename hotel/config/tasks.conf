[program:demo_hotel_tasks]
command=/var/deployments/demo/hotel/.venv/bin/celery -A settings worker -n demo-hotel@%%h -l INFO --autoscale=10,3
directory=/var/deployments/demo/hotel
stderr_logfile=/var/deployments/demo/hotel/logs/tasks.stderr.log
stdout_logfile=/var/deployments/demo/hotel/logs/tasks.stdout.log
autostart=true
autorestart=true
user=ubuntu
environment=HOME="/home/ubuntu",USER="ubuntu"

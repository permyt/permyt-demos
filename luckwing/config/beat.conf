[program:demo_luckwing_beat]
command=/var/deployments/demo/luckwing/env/bin/celery -A settings beat -l INFO
directory=/var/deployments/demo/luckwing
stderr_logfile=/var/deployments/demo/luckwing/logs/beat.stderr.log
stdout_logfile=/var/deployments/demo/luckwing/logs/beat.stdout.log
autostart=true
autorestart=true
user=ubuntu
environment=HOME="/home/ubuntu",USER="ubuntu"

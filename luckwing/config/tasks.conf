[program:demo_luckwing_tasks]
command=/var/deployments/demo/luckwing/env/bin/celery -A settings worker -n demo-luckwing@%%h -l INFO --autoscale=10,3
directory=/var/deployments/demo/luckwing
stderr_logfile=/var/deployments/demo/luckwing/logs/tasks.stderr.log
stdout_logfile=/var/deployments/demo/luckwing/logs/tasks.stdout.log
autostart=true
autorestart=true
user=ubuntu
environment=HOME="/home/ubuntu",USER="ubuntu"

[fcgi-program:demo_requester_app]
socket=tcp://localhost:9010
command=/var/deployments/demo/requester/env/bin/daphne -u /var/deployments/demo/requester/sockets/app.%(process_num)s.sock --fd 0 settings.asgi:application
directory=/var/deployments/demo/requester
stderr_logfile=/var/deployments/demo/requester/logs/app.stderr.log
stdout_logfile=/var/deployments/demo/requester/logs/app.stdout.log
autostart=true
autorestart=true
user=ubuntu
environment=HOME="/home/ubuntu",USER="ubuntu"
numprocs=2
process_name=%(program_name)s_%(process_num)s

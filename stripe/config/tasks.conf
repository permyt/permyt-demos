[program:demo_stripe_tasks]
command=/var/deployments/demo/stripe/.venv/bin/celery -A settings worker -n demo-stripe@%%h -l INFO --autoscale=10,3
directory=/var/deployments/demo/stripe
stderr_logfile=/var/deployments/demo/stripe/logs/tasks.stderr.log
stdout_logfile=/var/deployments/demo/stripe/logs/tasks.stdout.log
autostart=true
autorestart=true
user=ubuntu
environment=HOME="/home/ubuntu",USER="ubuntu"

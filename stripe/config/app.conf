[fcgi-program:demo_stripe_app]
socket=tcp://localhost:9016
command=/var/deployments/demo/stripe/.venv/bin/daphne -u /var/deployments/demo/stripe/sockets/app.%(process_num)s.sock --fd 0 settings.asgi:application
directory=/var/deployments/demo/stripe
stderr_logfile=/var/deployments/demo/stripe/logs/app.stderr.log
stdout_logfile=/var/deployments/demo/stripe/logs/app.stdout.log
autostart=true
autorestart=true
user=ubuntu
environment=HOME="/home/ubuntu",USER="ubuntu"
numprocs=2
process_name=%(program_name)s_%(process_num)s
